<!DOCTYPE html>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil | DUO</title>

```
<link rel="stylesheet" href="css/editar-perfil.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
```

</head>
<body>

<div class="container">

```
<div class="card">

    <div class="header">

        <h1>Editar Perfil</h1>

        <a href="perfil.html" class="btn-voltar">
            Voltar
        </a>

    </div>

    <form id="formPerfil">

        <div class="foto-area">

            <img
                id="previewFoto"
                src="https://i.pravatar.cc/150"
                alt="Foto">

            <input
                type="file"
                id="fotoPerfil"
                accept="image/*">

        </div>

        <div class="form-grid">

            <div class="campo">

                <label>Nome</label>

                <input
                    type="text"
                    id="nome">

            </div>

            <div class="campo">

                <label>Cidade</label>

                <input
                    type="text"
                    id="cidade">

            </div>

            <div class="campo full">

                <label>Biografia</label>

                <textarea
                    id="bio"
                    rows="4"></textarea>

            </div>

            <div class="campo">

                <label>Objetivo Atual</label>

                <input
                    type="text"
                    id="objetivo">

            </div>

            <div class="campo">

                <label>Nível</label>

                <select id="nivel">

                    <option>Iniciante</option>
                    <option>Intermediário</option>
                    <option>Avançado</option>

                </select>

            </div>

            <div class="campo full">

                <label>Conteúdos que Estudo</label>

                <input
                    type="text"
                    id="estuda"
                    placeholder="Separados por vírgula">

            </div>

            <div class="campo full">

                <label>Conteúdos que Leciono</label>

                <input
                    type="text"
                    id="leciona"
                    placeholder="Separados por vírgula">

            </div>

            <div class="campo full">

                <label>Tecnologias</label>

                <input
                    type="text"
                    id="tecnologias"
                    placeholder="Separadas por vírgula">

            </div>

        </div>

        <button
            type="submit"
            class="btn-salvar">

            Salvar Alterações

        </button>

    </form>

</div>
```

</div>

<script src="js/editar-perfil.js"></script>

</body>
</html>
